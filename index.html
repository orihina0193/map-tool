<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>避難所レイアウト v27.8.2</title>
    <style>
        :root { --top-h: 75px; --bot-h: 260px; }
        body { margin: 0; overflow: hidden; background: #e0e5ec; font-family: sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; background: #f0f0f0; }
        #top-panel { position: absolute; top: 0; width: 100%; height: var(--top-h); background: rgba(255,255,255,0.9); border-bottom: 1px solid #ccc; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; z-index: 100; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #item-list { display: flex; gap: 8px; align-items: center; }
        .thumb { width: 50px; height: 50px; border-radius: 6px; border: 2px solid #ccc; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #fff; flex-shrink: 0; }
        .thumb.selected { border-color: #007aff; border-width: 3px; box-shadow: 0 0 10px rgba(0,122,255,0.3); }
        .deselect-btn { width: 50px; height: 50px; border-radius: 6px; border: 1px solid #ccc; background: #eee; color: #666; font-size: 10px; font-weight: bold; flex-shrink: 0; }
        #upload-label { width: 50px; height: 50px; border: 2px dashed #bbb; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #999; flex-shrink: 0; background: #fff; }
        #bot-panel { position: absolute; bottom: 0; width: 100%; height: var(--bot-h); background: rgba(255,255,255,0.98); border-top: 1px solid #ccc; padding: 10px; box-sizing: border-box; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .slider-section { display: flex; flex-direction: column; gap: 4px; }
        .row { display: flex; align-items: center; gap: 6px; }
        .row label { font-size: 11px; font-weight: bold; width: 35px; }
        input[type="range"] { flex: 1; height: 32px; }
        .prec-btn { width: 38px; height: 35px; font-size: 18px; border: 1px solid #ccc; background: #fff; border-radius: 6px; }
        .tool-section { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        #nudge-grid { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(2, 40px); gap: 4px; }
        #nudge-grid button { font-size: 20px; border: 1px solid #ccc; background: #fff; border-radius: 8px; }
        .mode-box { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .mode-row { display: flex; gap: 4px; flex-wrap: wrap; }
        .mode-row button { flex: 1; min-width: 50px; height: 40px; font-size: 11px; font-weight: bold; border-radius: 8px; border: 1px solid #ccc; background: #fff; }
        .mode-row button.active { background: #007aff; color: #fff; border-color: #004da3; }
        .mode-row button.active.erase-mode { background: #ff3b30; border-color: #c41e16; }
        .save-btn { height: 40px; font-size: 14px; background: #34c759; border: none; border-radius: 8px; color: white; font-weight: bold; }
        .clear-btn { height: 30px; font-size: 11px; background: #eee; border: 1px solid #ccc; border-radius: 6px; color: #d32f2f; }
    </style>
</head>
<body>
<canvas id="cvs"></canvas>
<div id="top-panel"><div id="item-list"><button class="deselect-btn" onclick="deselect()">選択<br>解除</button><label id="upload-label">＋<input type="file" id="img-in" hidden accept="image/*" multiple onchange="handleFiles(this.files)"></label></div></div>
<div id="bot-panel">
    <div class="slider-section">
        <div class="row"><label>サイズ</label><button class="prec-btn" onclick="adjS(-0.1)">-</button><input type="range" id="size-s" min="0.1" max="5" step="0.1"><button class="prec-btn" onclick="adjS(0.1)">+</button></div>
        <div class="row"><label>接地</label><button class="prec-btn" onclick="adjO(-1)">-</button><input type="range" id="off-s" min="-100" max="100" step="1"><button class="prec-btn" onclick="adjO(1)">+</button></div>
    </div>
    <div class="tool-section">
        <div id="nudge-grid"><span></span><button onclick="nudge(0,-0.1)">↑</button><span></span><button onclick="nudge(-0.1,0)">←</button><button onclick="nudge(0,0.1)">↓</button><button onclick="nudge(0.1,0)">→</button></div>
        <div class="mode-box">
            <button class="save-btn" onclick="exportImage()">画像として保存</button>
            <div class="mode-row">
                <button id="m-move" onclick="setMode('move')">移動</button>
                <button id="m-pen" onclick="setMode('pen')">ペン</button>
                <button id="m-p-erase" onclick="setMode('p-erase')">ペン消し</button>
                <button id="m-erase" onclick="setMode('erase')" class="erase-mode">建物消去</button>
            </div>
            <button class="clear-btn" onclick="clearAll()">リセット</button>
        </div>
    </div>
</div>

<script>
const PRESETS = [
    { name: "HQ", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/HQ.png", s: 1.6, o: 1, gw: 2, gh: 2 },
    { name: "DOOM", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/DOOM.png", s: 1.6, o: -3, gw: 2, gh: 2 },
    { name: "MED", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/MED.png", s: 1.6, o: -1, gw: 2, gh: 2 },
    { name: "SRG", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/SRG.png", s: 1.7, o: -3, gw: 2, gh: 2 },
    { name: "RSS", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/RSS.png", s: 1.6, o: -4, gw: 2, gh: 2 },
    { name: "ST", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/ST.png", s: 1.6, o: 0, gw: 2, gh: 2 },
    { name: "OP", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/OP.png", s: 0.8, o: 0, gw: 1, gh: 1 },
    { name: "ROCK2", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/ROCK2.png", s: 0.8, o: -6, gw: 1, gh: 1 } 
];

const cvs = document.getElementById('cvs'); const ctx = cvs.getContext('2d');
const T_W = 64, T_H = 32;
let cam = { x: window.innerWidth/2, y: window.innerHeight/3, z: 1 };
let assets = [], map = [], lines = [], selIdx = -1, activeAsset = -1, mode = 'move';
let drag = false, pinch = false, lastT = {x: 0, y: 0}, lastG = null, lastDist = 0;

function init() {
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    loadPresets().then(() => { load(); render(); });
}

async function loadPresets() {
    for (const p of PRESETS) {
        await new Promise(resolve => {
            const img = new Image(); img.crossOrigin = "anonymous";
            img.onload = () => {
                const src = crop(img); const i2 = new Image();
                i2.onload = () => { assets.push({ img: i2, src, defS: p.s, defO: p.o, gw: p.gw, gh: p.gh }); addThumb(assets.length - 1); resolve(); };
                i2.src = src;
            };
            img.onerror = () => resolve(); img.src = p.url;
        });
    }
}

const toS = (gx, gy) => ({ x: (gx - gy) * (T_W/2), y: (gx + gy) * (T_H/2) });
const toG = (sx, sy) => {
    let x = (sx - cam.x)/cam.z, y = (sy - cam.y)/cam.z;
    let gy = (y/(T_H/2) - x/(T_W/2))/2; return { x: Math.round(x/(T_W/2) + gy), y: Math.round(gy) };
};

function render() {
    ctx.clearRect(0,0,cvs.width,cvs.height);
    ctx.save(); ctx.translate(cam.x, cam.y); ctx.scale(cam.z, cam.z);
    ctx.strokeStyle = "rgba(0,0,0,0.08)"; ctx.lineWidth = 1/cam.z;
    for(let i=-20; i<=40; i++){
        let s = toS(i,-20), e = toS(i,40); ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y); ctx.stroke();
        s = toS(-20,i); e = toS(40,i); ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y); ctx.stroke();
    }
    lines.forEach(l => {
        ctx.beginPath(); ctx.strokeStyle = "rgba(255,0,0,0.6)"; ctx.lineWidth = 4/cam.z;
        const s = toS(l.x1, l.y1), e = toS(l.x2, l.y2);
        ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke();
    });
    map.sort((a,b)=>(a.x+a.y)-(b.x+b.y)).forEach((d, i) => {
        const a = assets[d.aIdx]; if(!a) return;
        const w = T_W * d.s, h = (a.img.height/a.img.width) * w;
        const anchor = toS(d.x + a.gw, d.y + a.gh);
        ctx.drawImage(a.img, anchor.x - w / 2, anchor.y - h + d.off, w, h);
        if(selIdx === i) { ctx.strokeStyle = "#007aff"; ctx.lineWidth = 2/cam.z; const pS = toS(d.x+a.gw, d.y+a.gh), pW = toS(d.x, d.y+a.gh), pE = toS(d.x+a.gw, d.y), pN = toS(d.x, d.y); ctx.beginPath(); ctx.moveTo(pS.x,pS.y); ctx.lineTo(pW.x,pW.y); ctx.lineTo(pN.x,pN.y); ctx.lineTo(pE.x,pE.y); ctx.closePath(); ctx.stroke(); }
    });
    ctx.restore();
}

cvs.addEventListener('touchstart', e => {
    if(e.touches.length >= 2) { pinch = true; drag = false; lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); return; }
    const t = e.touches[0]; lastT = {x: t.clientX, y: t.clientY};
    const g = toG(t.clientX, t.clientY); lastG = g;
    if(mode === 'move') {
        if(activeAsset !== -1) { const a = assets[activeAsset]; map.push({x: g.x-(a.gw-1), y: g.y-(a.gh-1), aIdx: activeAsset, s: a.defS, off: a.defO}); selIdx = map.length - 1; save(); }
        else { selIdx = map.findLastIndex(d => { const a = assets[d.aIdx]; return g.x >= d.x && g.x < d.x+a.gw && g.y >= d.y && g.y < d.y+a.gh; }); }
        drag = true;
    } else if(mode === 'erase') { map = map.filter(d => { const a = assets[d.aIdx]; return !(g.x >= d.x && g.x < d.x+a.gw && g.y >= d.y && g.y < d.y+a.gh); }); save(); }
    render();
}, {passive: false});

cvs.addEventListener('touchmove', e => {
    e.preventDefault();
    if(pinch && e.touches.length >= 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        cam.z *= (dist / lastDist); lastDist = dist;
    } else {
        const t = e.touches[0]; const g = toG(t.clientX, t.clientY);
        if(mode === 'pen') {
            if(lastG && (g.x !== lastG.x || g.y !== lastG.y)) {
                if(!lines.some(l => (l.x1==lastG.x && l.y1==lastG.y && l.x2==g.x && l.y2==g.y) || (l.x1==g.x && l.y1==g.y && l.x2==lastG.x && l.y2==lastG.y))) { lines.push({x1: lastG.x, y1: lastG.y, x2: g.x, y2: g.y}); save(); }
            }
        } else if(mode === 'p-erase') {
            lines = lines.filter(l => !((l.x1==lastG.x && l.y1==lastG.y && l.x2==g.x && l.y2==g.y) || (l.x1==g.x && l.y1==g.y && l.x2==lastG.x && l.y2==lastG.y))); save();
        } else if(drag) { cam.x += (t.clientX - lastT.x); cam.y += (t.clientY - lastT.y); }
        lastT = {x: t.clientX, y: t.clientY}; lastG = g;
    }
    render();
}, {passive: false});

cvs.addEventListener('touchend', () => { drag = pinch = false; lastG = null; });

function setMode(m) { mode = m; document.querySelectorAll('.mode-row button').forEach(b => b.classList.remove('active')); document.getElementById(`m-${m}`).classList.add('active'); }
window.adjS = (v) => { if(selIdx!==-1){ map[selIdx].s += v; save(); render(); } };
window.adjO = (v) => { if(selIdx!==-1){ map[selIdx].off += v; save(); render(); } };
window.nudge = (dx,dy) => { if(selIdx!==-1){ map[selIdx].x+=dx; map[selIdx].y+=dy; save(); render(); } };
function addThumb(idx) { const d = document.createElement('div'); d.className = 'thumb'; d.style.backgroundImage = `url(${assets[idx].src})`; d.onclick = () => { activeAsset = idx; setMode('move'); document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('selected')); d.classList.add('selected'); }; document.getElementById('item-list').appendChild(d); }
window.deselect = () => { activeAsset = -1; selIdx = -1; document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('selected')); render(); };
function save() { localStorage.setItem('map_final_v3', JSON.stringify({m:map, l:lines})); }
function load() { const s = localStorage.getItem('map_final_v3'); if(s) { const d = JSON.parse(s); map = d.m || []; lines = d.l || []; } }
function crop(img) { const c = document.createElement('canvas'); const t = c.getContext('2d'); c.width = img.width; c.height = img.height; t.drawImage(img,0,0); const d = t.getImageData(0,0,c.width,c.height).data; let x1=c.width, y1=c.height, x2=0, y2=0; for(let y=0; y<c.height; y++) for(let x=0; x<c.width; x++) if(d[(y*c.width+x)*4+3]>10){ x1=Math.min(x1,x); y1=Math.min(y1,y); x2=Math.max(x2,x); y2=Math.max(y2,y); } const w = x2-x1+1, h = y2-y1+1; const c2 = document.createElement('canvas'); c2.width = w; c2.height = h; c2.getContext('2d').drawImage(img,x1,y1,w,h,0,0,w,h); return c2.toDataURL(); }
function exportImage() { deselect(); render(); const link = document.createElement('a'); link.download = 'layout.png'; link.href = cvs.toDataURL(); link.click(); }
window.clearAll = () => { if(confirm("全消去しますか？")){ localStorage.clear(); location.reload(); } };
init();
</script>
</body>
</html>
