<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>避難所レイアウト v22.6</title>
    <style>
        :root { --top-h: 75px; --bot-h: 245px; }
        body { margin: 0; overflow: hidden; background: #e0e5ec; font-family: sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; background: #f0f0f0; }
        #top-panel { position: absolute; top: 0; width: 100%; height: var(--top-h); background: rgba(255,255,255,0.9); border-bottom: 1px solid #ccc; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; z-index: 100; overflow-x: auto; }
        #item-list { display: flex; gap: 8px; align-items: center; }
        .thumb { width: 50px; height: 50px; border-radius: 6px; border: 2px solid #ccc; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #fff; flex-shrink: 0; }
        .thumb.selected { border-color: #007aff; border-width: 3px; box-shadow: 0 0 10px rgba(0,122,255,0.3); }
        .deselect-btn { width: 50px; height: 50px; border-radius: 6px; border: 1px solid #ccc; background: #eee; color: #666; font-size: 10px; font-weight: bold; flex-shrink: 0; }
        #upload-label { width: 50px; height: 50px; border: 2px dashed #bbb; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #999; flex-shrink: 0; background: #fff; }
        #bot-panel { position: absolute; bottom: 0; width: 100%; height: var(--bot-h); background: rgba(255,255,255,0.98); border-top: 1px solid #ccc; padding: 12px; box-sizing: border-box; z-index: 100; display: flex; flex-direction: column; gap: 12px; }
        .slider-section { display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; align-items: center; gap: 6px; }
        .row label { font-size: 11px; font-weight: bold; width: 35px; }
        input[type="range"] { flex: 1; height: 32px; }
        .prec-btn { width: 38px; height: 35px; font-size: 18px; border: 1px solid #ccc; background: #fff; border-radius: 6px; }
        .tool-section { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        #nudge-grid { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(2, 40px); gap: 4px; }
        #nudge-grid button { font-size: 20px; border: 1px solid #ccc; background: #fff; border-radius: 8px; }
        .mode-box { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .mode-row { display: flex; gap: 4px; }
        .mode-row button { flex: 1; height: 40px; font-size: 11px; font-weight: bold; border-radius: 8px; border: 1px solid #ccc; background: #fff; }
        .mode-row button.active { background: #ff3b30; color: #fff; border-color: #c41e16; }
        #m-move.active { background: #007aff; border-color: #004da3; }
        #m-erase.active { background: #8e8e93; border-color: #636366; }
        .clear-btn { height: 32px; font-size: 11px; background: #eee; border: 1px solid #ccc; border-radius: 6px; color: #666; }
        #zoom-tag { position: absolute; top: 85px; right: 10px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 12px; z-index: 50; }
    </style>
</head>
<body>
<canvas id="cvs"></canvas>
<div id="zoom-tag">Zoom: 100%</div>
<div id="top-panel"><div id="item-list"><button class="deselect-btn" onclick="deselect()">選択<br>解除</button><label id="upload-label">＋<input type="file" id="img-in" hidden accept="image/*" multiple></label></div></div>
<div id="bot-panel">
    <div class="slider-section">
        <div class="row"><label>サイズ</label><button class="prec-btn" onclick="adjS(-0.1)">-</button><input type="range" id="size-s" min="0.1" max="5" step="0.1" value="1"><button class="prec-btn" onclick="adjS(0.1)">+</button></div>
        <div class="row"><label>接地</label><button class="prec-btn" onclick="adjO(-1)">-</button><input type="range" id="off-s" min="-100" max="100" step="1" value="0"><button class="prec-btn" onclick="adjO(1)">+</button></div>
    </div>
    <div class="tool-section">
        <div id="nudge-grid"><span></span><button onclick="nudge(0,-0.1)">↑</button><span></span><button onclick="nudge(-0.1,0)">←</button><button onclick="nudge(0,0.1)">↓</button><button onclick="nudge(0.1,0)">→</button></div>
        <div class="mode-box">
            <div class="mode-row"><button id="m-move">移動</button><button id="m-pen">ペン</button><button id="m-erase">消去</button></div>
            <button class="clear-btn" onclick="clearAll()">全消去</button>
        </div>
    </div>
</div>
<script>
const cvs = document.getElementById('cvs'); const ctx = cvs.getContext('2d');
const sizeS = document.getElementById('size-s'); const offS = document.getElementById('off-s');
const T_W = 64, T_H = 32;
let cam = { x: window.innerWidth/2, y: window.innerHeight/3, z: 1 };
let assets = [], map = [], edgeLines = [], selIdx = -1, activeAsset = -1, mode = 'move';
let drag = false, pinch = false, lastDist = 0, lastMid = {x:0, y:0}, lastT = {x:0, y:0};
let touchStartTime = 0, hasMoved = false;

function init() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; load(); setMode('move'); render(); }
const toS = (gx, gy) => ({ x: (gx - gy) * (T_W/2), y: (gx + gy) * (T_H/2) });
const toG = (sx, sy) => {
    let x = (sx - cam.x)/cam.z, y = (sy - cam.y)/cam.z;
    let gy = (y/(T_H/2) - x/(T_W/2))/2; return { x: x/(T_W/2) + gy, y: gy };
};

function render() {
    ctx.clearRect(0,0,cvs.width,cvs.height);
    ctx.save(); ctx.translate(cam.x, cam.y); ctx.scale(cam.z, cam.z);
    
    // グリッド描画
    ctx.strokeStyle = "rgba(0,0,0,0.08)"; ctx.lineWidth = 1;
    for(let i=-20; i<=40; i++){
        let s = toS(i,-20), e = toS(i,40); ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y); ctx.stroke();
        s = toS(-20,i); e = toS(40,i); ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y); ctx.stroke();
    }
    
    // 赤い線
    ctx.strokeStyle = "#ff3b30"; ctx.lineWidth = 3; ctx.lineCap = "round";
    edgeLines.forEach(l => {
        let p1 = toS(l.x1, l.y1), p2 = toS(l.x2, l.y2); ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    });

    // オブジェクト描画
    map.forEach((d, i) => {
        const a = assets[d.aIdx]; if(!a) return;
        let w = T_W * d.s;
        let h = (a.img.height/a.img.width) * w;

        // 【決定的修正】南側（手前）頂点をアンカーにする
        // タイルの北端座標(d.x, d.y)にサイズ(d.s)を足した地点が、タイルの一番手前の角（南端）
        let southPoint = toS(d.x + d.s, d.y + d.s);
        
        // southPoint.x, southPoint.y が「地面」の基準点
        // 画像の下端中央をここに合わせることで、サイズを変えても足元が動かない
        ctx.drawImage(a.img, southPoint.x - w/2, southPoint.y - h + (a.off || 0), w, h);

        if(selIdx === i) {
            ctx.strokeStyle = "#007aff"; ctx.lineWidth = 2;
            let b1 = toS(d.x, d.y), b2 = toS(d.x+d.s, d.y), b3 = toS(d.x+d.s, d.y+d.s), b4 = toS(d.x, d.y+d.s);
            ctx.beginPath(); ctx.moveTo(b1.x,b1.y); ctx.lineTo(b2.x,b2.y); ctx.lineTo(b3.x,b3.y); ctx.lineTo(b4.x,b4.y); ctx.closePath(); ctx.stroke();
        }
    });
    ctx.restore();
}

/* --- イベント・ユーティリティ群 --- */
cvs.addEventListener('touchstart', e => {
    touchStartTime = Date.now(); hasMoved = false;
    const t = e.touches[0]; lastT = {x: t.clientX, y: t.clientY};
    if(e.touches.length >= 2) { pinch = true; drag = false;
        lastDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        lastMid = {x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2};
        return;
    }
    drag = true;
});
cvs.addEventListener('touchmove', e => {
    e.preventDefault(); const t = e.touches[0];
    if(Math.hypot(t.clientX - lastT.x, t.clientY - lastT.y) > 5) hasMoved = true;
    if(pinch && e.touches.length >= 2) {
        let d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        let m = {x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2};
        let f = d / lastDist; cam.x = m.x - (m.x - cam.x)*f + (m.x - lastMid.x); cam.y = m.y - (m.y - cam.y)*f + (m.y - lastMid.y);
        cam.z *= f; lastDist = d; lastMid = m; document.getElementById('zoom-tag').innerText = "Zoom: "+Math.round(cam.z*100)+"%";
    } else if(drag) {
        const g = toG(t.clientX, t.clientY); const prevG = toG(lastT.x, lastT.y);
        if(mode === 'pen') {
            let curX = Math.floor(g.x + 0.5), curY = Math.floor(g.y + 0.5);
            let oldX = Math.floor(prevG.x + 0.5), oldY = Math.floor(prevG.y + 0.5);
            if(curX !== oldX || curY !== oldY) { addEdgeLine(oldX, oldY, curX, curY); render(); }
        } else if(mode === 'erase') { removeEdgeLine(g.x, g.y); render(); }
        else if(mode === 'move' && selIdx === -1 && activeAsset === -1) { cam.x += (t.clientX - lastT.x); cam.y += (t.clientY - lastT.y); render(); }
    }
    lastT = {x: t.clientX, y: t.clientY}; render();
});
cvs.addEventListener('touchend', e => {
    if(!pinch && drag && !hasMoved && (Date.now() - touchStartTime < 250)) {
        const g = toG(lastT.x, lastT.y);
        if(mode === 'move') {
            let h = map.findIndex(d => g.x >= d.x && g.x < d.x+d.s && g.y >= d.y && g.y < d.y+d.s);
            if(h !== -1) { selIdx = h; activeAsset = -1; sizeS.value = map[h].s; offS.value = assets[map[h].aIdx].off || 0; document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('selected')); }
            else if(activeAsset !== -1) { map.push({x:Math.floor(g.x), y:Math.floor(g.y), aIdx:activeAsset, s:parseFloat(sizeS.value)}); selIdx = map.length-1; }
            else { selIdx = -1; }
        } else if(mode === 'erase') {
            let h = map.findIndex(d => g.x >= d.x && g.x < d.x+d.s && g.y >= d.y && g.y < d.y+d.s);
            if(h !== -1) map.splice(h, 1);
        }
    }
    drag = pinch = false; save(); render();
});
window.deselect = () => { activeAsset = -1; selIdx = -1; document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('selected')); render(); };
function addEdgeLine(gx1, gy1, gx2, gy2) {
    const key = [gx1, gy1, gx2, gy2].sort((a,b)=>a-b).join(',');
    if(!edgeLines.some(l => [l.x1, l.y1, l.x2, l.y2].sort((a,b)=>a-b).join(',') === key)) edgeLines.push({x1:gx1, y1:gy1, x2:gx2, y2:gy2});
}
function removeEdgeLine(gx, gy) {
    let x = Math.floor(gx), y = Math.floor(gy);
    edgeLines = edgeLines.filter(l => !((l.x1===x&&l.y1===y&&l.x2===x+1&&l.y2===y)||(l.x1===x&&l.y1===y&&l.x2===x&&l.y2===y+1)||(l.x1===x+1&&l.y1===y&&l.x2===x+1&&l.y2===y+1)||(l.x1===x&&l.y1===y+1&&l.x2===x+1&&l.y2===y+1)));
}
function setMode(m) {
    mode = m; selIdx = -1; if(m !== 'move') { activeAsset = -1; document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected')); }
    document.getElementById('m-move').className = m === 'move' ? 'active' : '';
    document.getElementById('m-pen').className = m === 'pen' ? 'active' : '';
    document.getElementById('m-erase').className = m === 'erase' ? 'active' : '';
    render();
}
document.getElementById('m-move').onclick = () => setMode('move');
document.getElementById('m-pen').onclick = () => setMode('pen');
document.getElementById('m-erase').onclick = () => setMode('erase');

document.getElementById('img-in').onchange = (e) => {
    for(let f of e.target.files) {
        const r = new FileReader();
        r.onload = (ev) => {
            const i = new Image(); i.onload = () => {
                const src = crop(i); const i2 = new Image();
                i2.onload = () => { assets.push({img: i2, src: src, off: 0}); addThumb(assets.length-1); save(); };
                i2.src = src;
            }; i.src = ev.target.result;
        }; r.readAsDataURL(f);
    }
};
function crop(img) {
    const c = document.createElement('canvas'); const t = c.getContext('2d');
    c.width = img.width; c.height = img.height; t.drawImage(img,0,0);
    const d = t.getImageData(0,0,c.width,c.height).data;
    let x1=c.width, y1=c.height, x2=0, y2=0;
    for(let y=0; y<c.height; y++) for(let x=0; x<c.width; x++) if(d[(y*c.width+x)*4+3]>10){ x1=Math.min(x1,x); y1=Math.min(y1,y); x2=Math.max(x2,x); y2=Math.max(y2,y); }
    const w = x2-x1+1, h = y2-y1+1; const c2 = document.createElement('canvas'); c2.width = w; c2.height = h;
    c2.getContext('2d').drawImage(img,x1,y1,w,h,0,0,w,h); return c2.toDataURL();
}
function addThumb(idx) {
    const d = document.createElement('div'); d.className = 'thumb'; d.style.backgroundImage = `url(${assets[idx].src})`;
    d.onclick = () => { setMode('move'); document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('selected')); d.classList.add('selected'); activeAsset = idx; selIdx = -1; offS.value = assets[idx].off || 0; render(); };
    document.getElementById('item-list').appendChild(d);
}
function save() { localStorage.setItem('map_v22', JSON.stringify({m:map, el:edgeLines, a:assets.map(a=>({src:a.src, off:a.off}))})); }
function load() {
    const s = localStorage.getItem('map_v22') || localStorage.getItem('map_v21'); if(!s) return;
    const d = JSON.parse(s); map = d.m || []; edgeLines = d.el || [];
    d.a.forEach((ad, i) => { const img = new Image(); img.onload = () => { assets[i]={img, src:ad.src, off:ad.off}; addThumb(i); render(); }; img.src = ad.src; });
}
window.nudge = (dx,dy) => { if(selIdx!==-1){ map[selIdx].x+=dx; map[selIdx].y+=dy; render(); save(); } };
window.adjS = (v) => { if(selIdx!==-1){ let n = parseFloat(sizeS.value)+v; n=Math.max(0.1,Math.min(5,n)); sizeS.value=n; map[selIdx].s=n; render(); save(); } };
window.adjO = (v) => { let idx=(selIdx!==-1)?map[selIdx].aIdx:activeAsset; if(idx!==-1){ let n=parseInt(offS.value)+v; offS.value=n; assets[idx].off=n; render(); save(); } };
sizeS.oninput = () => { if(selIdx!==-1){ map[selIdx].s=parseFloat(sizeS.value); render(); } };
offS.oninput = () => { let idx=(selIdx!==-1)?map[selIdx].aIdx:activeAsset; if(idx!==-1){ assets[idx].off=parseInt(offS.value); render(); } };
window.clearAll = () => { if(confirm("消去？")){ localStorage.clear(); location.reload(); } };
init();
</script>
</body>
</html>
