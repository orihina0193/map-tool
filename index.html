<script>
// ... (PRESETSなどはIkumiさんの最新設定を維持)

function render() {
    ctx.clearRect(0,0,cvs.width,cvs.height);
    ctx.save(); ctx.translate(cam.x, cam.y); ctx.scale(cam.z, cam.z);
    
    // グリッド描画
    ctx.strokeStyle = "rgba(0,0,0,0.08)";
    for(let i=-20; i<=40; i++){
        let s = toS(i,-20), e = toS(i,40); ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y); ctx.stroke();
        s = toS(-20,i); e = toS(40,i); ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y); ctx.stroke();
    }

    let drawList = map.map((d, i) => ({ data: d, sort: d.x + d.y, originalIdx: i }));
    drawList.sort((a, b) => a.sort - b.sort);

    drawList.forEach(obj => {
        const d = obj.data; const a = assets[d.aIdx]; if(!a || !a.img) return;
        const w = T_W * d.s; const h = (a.img.height/a.img.width) * w;
        
        // --- 起点の修正：マスの「南端（手前）」を基準にする ---
        const anchor = toS(d.x + a.gw, d.y + a.gh);
        ctx.drawImage(a.img, anchor.x - w / 2, anchor.y - h + d.off, w, h);

        // 青い選択枠の描画（ここも起点に合わせる）
        if(selIdx === obj.originalIdx) {
            ctx.strokeStyle = "#007aff"; ctx.lineWidth = 2;
            const pS = toS(d.x + a.gw, d.y + a.gh), // 南 (手前)
                  pW = toS(d.x, d.y + a.gh),       // 西 (左)
                  pE = toS(d.x + a.gw, d.y),       // 東 (右)
                  pN = toS(d.x, d.y);             // 北 (奥)
            ctx.beginPath(); ctx.moveTo(pS.x,pS.y); ctx.lineTo(pW.x,pW.y); 
            ctx.lineTo(pN.x,pN.y); ctx.lineTo(pE.x,pE.y); ctx.closePath(); ctx.stroke();
        }
    });
    ctx.restore(); updateInfo();
}
// ... (以下略)
</script>
