<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>避難所レイアウト・プロト v4</title>
    <style>
        :root { --top-h: 80px; --bot-h: 150px; }
        body { margin: 0; overflow: hidden; background: #e0e5ec; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #top-panel {
            position: absolute; top: 0; width: 100%; height: var(--top-h);
            background: rgba(255,255,255,0.9); border-bottom: 1px solid #ccc;
            display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; z-index: 100;
        }
        #item-list { display: flex; overflow-x: auto; gap: 10px; flex: 1; height: 100%; align-items: center; }
        
        #bot-panel {
            position: absolute; bottom: 0; width: 100%; height: var(--bot-h);
            background: rgba(255,255,255,0.95); border-top: 1px solid #ccc;
            display: grid; grid-template-columns: 100px 1fr 100px; padding: 10px; box-sizing: border-box; z-index: 100;
        }

        .thumb {
            width: 55px; height: 55px; border-radius: 8px; border: 2px solid #ccc;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            background-color: #fff; flex-shrink: 0; cursor: pointer;
        }
        /* 選択中のスタイル */
        .thumb.selected { border-color: #007aff; box-shadow: 0 0 5px rgba(0,122,255,0.5); }

        #upload-label {
            width: 55px; height: 55px; border: 2px dashed #bbb; border-radius: 8px;
            display: flex; justify-content: center; align-items: center; font-size: 24px; color: #999; flex-shrink: 0;
        }

        #nudge-grid { display: grid; grid-template-columns: repeat(3, 30px); grid-template-rows: repeat(2, 35px); gap: 2px; align-self: center; }
        #nudge-grid button { padding: 0; font-size: 18px; border: 1px solid #ccc; background: #fff; border-radius: 4px; }

        #center-ctrl { display: flex; flex-direction: column; justify-content: space-around; padding: 0 10px; }
        .row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
        input[type="range"] { flex: 1; }

        #side-btns { display: flex; flex-direction: column; gap: 5px; justify-content: center; }
        #side-btns button { padding: 8px 0; font-size: 12px; border-radius: 6px; border: 1px solid #ccc; background: #fff; }
        #side-btns button.active { background: #007aff; color: #fff; }
        
        #zoom-info { position: absolute; top: calc(var(--top-h) + 10px); right: 10px; background: rgba(0,0,0,0.5); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="cvs"></canvas>
<div id="zoom-info">Zoom: 100%</div>

<div id="top-panel">
    <div id="item-list">
        <label id="upload-label">＋<input type="file" id="img-in" hidden accept="image/*" multiple></label>
    </div>
</div>

<div id="bot-panel">
    <div id="nudge-grid">
        <span></span><button onclick="nudge(0,-0.1)">↑</button><span></span>
        <button onclick="nudge(-0.1,0)">←</button><button onclick="nudge(0,0.1)">↓</button><button onclick="nudge(0.1,0)">→</button>
    </div>

    <div id="center-ctrl">
        <div class="row">
            <span>サイズ:</span>
            <input type="range" id="size-slider" min="0.1" max="10" step="0.1" value="1">
        </div>
        <div class="row" style="justify-content: center; gap: 20px;">
            <button id="del-btn" style="color:red;">選択削除</button>
            <button id="clear-btn">全消去</button>
        </div>
    </div>

    <div id="side-btns">
        <button id="mode-move" class="active">移動</button>
        <button id="mode-pen">ペン</button>
    </div>
</div>

<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const imgIn = document.getElementById('img-in');
const itemList = document.getElementById('item-list');
const sizeSlider = document.getElementById('size-slider');
const zoomInfo = document.getElementById('zoom-info');

const T_W = 64, T_H = 32;
let camera = { x: window.innerWidth/2, y: window.innerHeight/3, zoom: 1 };
let assets = [];
let mapData = []; 
let lines = [];   
let selectedIdx = -1;
let activeAssetIdx = -1; // 【追加】現在選択中の画像のインデックス
let mode = 'move';
let isDragging = false;
let isPinching = false; // 【追加】ピンチズーム中かどうかのフラグ
let lastPinchDist = 0;
let penStart = null;

function init() {
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight;
    loadData();
    render();
}

const toScreen = (gx, gy) => ({ x: (gx - gy) * (T_W/2), y: (gx + gy) * (T_H/2) });
const toGrid = (sx, sy) => {
    let x = (sx - camera.x) / camera.zoom;
    let y = (sy - camera.y) / camera.zoom;
    let gy = (y / (T_H/2) - x / (T_W/2)) / 2;
    let gx = (x / (T_W/2) + gy);
    return { x: gx, y: gy };
};

function render() {
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    ctx.save();
    ctx.translate(camera.x, camera.y);
    ctx.scale(camera.zoom, camera.zoom);

    ctx.strokeStyle = "rgba(0,0,0,0.05)";
    for(let i=-20; i<=40; i++) {
        let s = toScreen(i, -20), e = toScreen(i, 40);
        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke();
        s = toScreen(-20, i); e = toScreen(40, i);
        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke();
    }

    ctx.strokeStyle = "#ff4444"; ctx.lineWidth = 3;
    lines.forEach(l => {
        let p1 = toScreen(l.x1, l.y1), p2 = toScreen(l.x2, l.y2);
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    });

    mapData.forEach((d, idx) => {
        const asset = assets[d.assetIdx];
        if(!asset) return;
        let pos = toScreen(d.x, d.y);
        let w = T_W * d.size;
        let h = (asset.img.height / asset.img.width) * w;
        ctx.drawImage(asset.img, pos.x - w/2, pos.y - h + (T_H/2)*d.size, w, h);

        if(selectedIdx === idx) {
            ctx.strokeStyle = "#007aff"; ctx.lineWidth = 2;
            let p1 = toScreen(d.x, d.y), p2 = toScreen(d.x+d.size, d.y);
            let p3 = toScreen(d.x+d.size, d.y+d.size), p4 = toScreen(d.x, d.y+d.size);
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.closePath(); ctx.stroke();
        }
    });
    ctx.restore();
}

let lastT = {x:0, y:0};
cvs.addEventListener('touchstart', e => {
    isDragging = true;
    const t = e.touches[0];
    lastT = {x: t.clientX, y: t.clientY};
    
    // 指が2本以上ならピンチモードへ
    if(e.touches.length >= 2) {
        isPinching = true;
        isDragging = false; // ドラッグを停止
        lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        return;
    } else {
        isPinching = false;
    }

    // パネル領域外のみ反応
    if(t.clientY < 80 || t.clientY > window.innerHeight - 150) return;

    // 【修正】ピンチ中でなく、画像が選択されているときのみ配置
    if(!isPinching && activeAssetIdx !== -1 && mode === 'move') {
        const g = toGrid(t.clientX, t.clientY);
        
        // 配置済みをクリックしたか判定
        let hit = mapData.findIndex(d => g.x >= d.x && g.x < d.x+d.size && g.y >= d.y && g.y < d.y+d.size);
        
        if(hit !== -1) {
            selectedIdx = hit;
            sizeSlider.value = mapData[hit].size;
        } else {
            // 画像が選択されていれば配置
            mapData.push({x: Math.floor(g.x), y: Math.floor(g.y), assetIdx: activeAssetIdx, size: 1});
            selectedIdx = mapData.length - 1;
            saveData();
        }
    } else if(mode === 'pen' && !isPinching) {
        const g = toGrid(t.clientX, t.clientY);
        penStart = {x: Math.round(g.x), y: Math.round(g.y)};
    }
    render();
});

cvs.addEventListener('touchmove', e => {
    const t = e.touches[0];
    if(e.touches.length >= 2 && isPinching) {
        // ピンチズーム
        let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        camera.zoom *= (dist / lastPinchDist);
        lastPinchDist = dist;
        zoomInfo.innerText = "Zoom: " + Math.round(camera.zoom * 100) + "%";
    } else if(isDragging && !isPinching) {
        // カメラ移動（ペンモード以外）
        if(mode !== 'pen') {
            camera.x += (t.clientX - lastT.x);
            camera.y += (t.clientY - lastT.y);
        }
    }
    lastT = {x: t.clientX, y: t.clientY};
    render();
});

cvs.addEventListener('touchend', e => {
    if(mode === 'pen' && penStart && !isPinching) {
        const g = toGrid(lastT.x, lastT.y);
        lines.push({x1: penStart.x, y1: penStart.y, x2: Math.round(g.x), y2: Math.round(g.y)});
        penStart = null;
        saveData();
    }
    isDragging = false;
    // 指が離れたらピンチモードを解除
    if(e.touches.length < 2) {
        isPinching = false;
    }
    render();
});

function nudge(dx, dy) {
    if(selectedIdx !== -1) {
        mapData[selectedIdx].x += dx;
        mapData[selectedIdx].y += dy;
        render(); saveData();
    }
}

sizeSlider.oninput = () => {
    if(selectedIdx !== -1) {
        mapData[selectedIdx].size = parseFloat(sizeSlider.value);
        render();
    }
};

document.getElementById('mode-move').onclick = () => { mode = 'move'; updateMode(); };
document.getElementById('mode-pen').onclick = () => { mode = 'pen'; updateMode(); };
function updateMode() {
    document.getElementById('mode-move').classList.toggle('active', mode==='move');
    document.getElementById('mode-pen').classList.toggle('active', mode==='pen');
}

imgIn.onchange = (e) => {
    for(let file of e.target.files) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.src = ev.target.result;
            img.onload = () => {
                assets.push({img, src: img.src});
                addThumb(assets.length - 1);
                saveData();
            };
        };
        reader.readAsDataURL(file);
    }
};

function addThumb(idx) {
    const div = document.createElement('div');
    div.className = 'thumb'; div.style.backgroundImage = `url(${assets[idx].src})`;
    div.onclick = () => {
        // 【修正】トグル選択
        if(activeAssetIdx === idx) {
            // すでに選択されているなら解除
            div.classList.remove('selected');
            activeAssetIdx = -1;
        } else {
            // 新しく選択
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected'));
            div.classList.add('selected');
            activeAssetIdx = idx;
        }
    };
    itemList.appendChild(div);
}

function saveData() {
    localStorage.setItem('map_v4', JSON.stringify({map: mapData, lines: lines, imgs: assets.map(a => a.src)}));
}
function loadData() {
    const saved = localStorage.getItem('map_v4');
    if(!saved) return;
    const d = JSON.parse(saved);
    mapData = d.map || []; lines = d.lines || [];
    d.imgs.forEach((src, i) => {
        const img = new Image(); img.src = src;
        img.onload = () => {
            assets[i] = {img, src};
            addThumb(i);
            render();
        };
    });
}
document.getElementById('del-btn').onclick = () => { if(selectedIdx!==-1){ mapData.splice(selectedIdx, 1); selectedIdx=-1; render(); saveData(); }};
document.getElementById('clear-btn').onclick = () => { if(confirm("消去？")){ mapData=[]; lines=[]; render(); saveData(); }};

init();
</script>
</body>
</html>
